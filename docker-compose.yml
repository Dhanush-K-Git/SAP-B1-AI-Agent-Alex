services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sapb1_mvp_pg
    environment:
      POSTGRES_DB: sapb1_mvp
      POSTGRES_USER: mvp
      POSTGRES_PASSWORD: mvp
    ports:
      - "5433:5432"
    volumes:
      - sapb1_mvp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mvp -d sapb1_mvp"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  sapb1_mvp_pgdata:
